<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Dawson Weilage</title>
  <link rel="icon" type="image/x-icon" href="/assets/black2-logo-B7wwedc-.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-CZb-hHcl.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BWzMFIyO.css">
</head>
<body>
  <div class="progress-bar-container">
      <label id="progress-bar-label" for="progress-bar">Loading</label>
      <span class="loader" id="loadingCircle"></span>
  </div>

  <div class="popup1-wrapper" id="popup1-wrapper">
    <div class="popup1-container">
      <h1>Welcome!</h1>
      <p>Feel free to look around and learn more about me by clicking on the Game Boy or Computer:</p>
      <div>
        <img src="/static/gameboyIcon.png" alt="gameboyIcon">
      </div>
      <button id="popup1-button" class="popup-button">continue</button>
    </div>
  </div>

  <div class="popup2-wrapper" id="popup2-wrapper">
    <div class="popup2-container">
      <h1>Controls</h1>
      <div class="controls-headers">
        <div class="control-button-container mobile-button">
          <button class="control-button flex column active" id="mobile-button"><img src="/static/mobile.svg" class="controls-image">Mobile</button>
        </div> 
        <h1 style="font-weight: 200;">/</h1>
        <div class="control-button-container">
          <button class="control-button flex column" id="desktop-button"><img src="/static/keyboard.svg" class="controls-image">Desktop</button>
        </div> 
      </div>
      <div class="mobile-controls-container" id="mobile-controls">
        <div>
          <div class="controls">
            <div class="control-names">
              <p>Move:</p>
              <p>Interact:</p>
              <p>Back:</p>
              <p>Start:</p>
              <p>Select:</p>
              <p>Zoom In/Out:</p>
            </div>
            <div class="control-keys">
              <p>D-Pad</p>
              <p>A</p>
              <p>B</p>
              <p>Start</p>
              <p>Select</p>
              <p>Pinch</p>
            </div>
          </div>
        </div>
      </div>
      <div class="desktop-controls-container" id="desktop-controls" hidden>
        <div class="controls">
          <div class="control-names">
            <p>Move:</p>
            <p>Interact:</p>
            <p>Back:</p>
            <p>Start:</p>
            <p>Select:</p>
            <p>Zoom In/Out:</p>
          </div>
          <div class="control-keys">
            <p>WASD</p>
            <p>O</p>
            <p>P</p>
            <p>Enter</p>
            <p>Shift</p>
            <p>Scroll</p>
          </div>
        </div>
      </div>
      <button id="popup2-button" class="popup-button">Got it!</button>
    </div>
  </div>
  <button class="ui-button" id="backArrowButton"><img src="/static/backArrow.svg"></button>
  <div class="right-gb-ui" id="rightGBUI">
    <input type="image" src="/static/showControls.svg" id="showControlsButton"></input>
    <input type="image" src="/static/soundOn.svg" id="soundButton"></input>
  </div>
  <button class="ui-button" id="linkButton">VISIT<img src="/static/link.svg"></button>
  <iframe src="./portfolio/monitor-index.html" id="pcScreen" class="pc-screen" hidden></iframe>
  <iframe src="./game/index.html" id="gameboyScreen" class="gameboy-screen visible" hidden></iframe>
</body>
</html>
